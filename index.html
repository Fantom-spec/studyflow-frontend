<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyFlow — Due Date Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6ef5;
    --accent2: #e8a838;
    --accent3: #3ecfac;
    --danger: #f05e6a;
    --text: #e8e8f0;
    --text2: #8888a8;
    --text3: #5a5a7a;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .app { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 0 20px 60px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #a98ef8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo h1 span { color: var(--accent); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.18s ease;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9180f8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,110,245,0.35); }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { color: var(--text); }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-danger { background: rgba(240,94,106,0.15); color: var(--danger); border: 1px solid rgba(240,94,106,0.3); }
  .btn-danger:hover { background: rgba(240,94,106,0.25); }
  .btn-success { background: rgba(62,207,172,0.15); color: var(--accent3); border: 1px solid rgba(62,207,172,0.3); }
  .btn-success:hover { background: rgba(62,207,172,0.25); }
  .btn-export { background: rgba(232,168,56,0.15); color: var(--accent2); border: 1px solid rgba(232,168,56,0.3); }
  .btn-export:hover { background: rgba(232,168,56,0.25); }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 18px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .stat-card::before {
    content: ''; position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.08;
  }
  .stat-card:nth-child(1)::before { background: var(--accent); }
  .stat-card:nth-child(2)::before { background: var(--accent3); }
  .stat-card:nth-child(3)::before { background: var(--accent2); }
  .stat-card:nth-child(4)::before { background: var(--danger); }

  .stat-label { font-size: 0.75rem; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; }
  .stat-card:nth-child(1) .stat-value { color: var(--accent); }
  .stat-card:nth-child(2) .stat-value { color: var(--accent3); }
  .stat-card:nth-child(3) .stat-value { color: var(--accent2); }
  .stat-card:nth-child(4) .stat-value { color: var(--danger); }
  .stat-sub { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

  .main-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 820px) { .main-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.2px;
  }
  .panel-body { padding: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.8rem; font-weight: 500; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  .form-control {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.18s;
    outline: none;
  }
  .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,110,245,0.15); }
  select.form-control { cursor: pointer; }
  select.form-control option { background: #1e1e28; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .filter-label { font-size: 0.78rem; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; margin-right: 4px; }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent; color: var(--text2);
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-chip.today-chip.active { background: var(--accent2); border-color: var(--accent2); }
  .filter-chip.overdue-chip.active { background: var(--danger); border-color: var(--danger); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  #task-list { display: flex; flex-direction: column; gap: 10px; min-height: 120px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 20px; color: var(--text3); text-align: center; gap: 12px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.3s ease;
    animation: fadeUp 0.25s ease both;
    cursor: default;
    position: relative;
  }
  .task-card:hover { border-color: #3a3a52; transform: translateY(-1px); box-shadow: var(--shadow); }
  .task-card.done { opacity: 0.5; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--text3); }
  .task-card.overdue { border-left: 3px solid var(--danger); }
  .task-card.due-today { border-left: 3px solid var(--accent2); }

  /* Completed tasks get a subtle bottom-section divider treatment */
  .task-card.done {
    border-style: dashed;
    border-color: var(--border);
  }

  .done-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 2px;
    margin-top: 4px;
  }
  .done-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .done-divider-label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  .task-checkbox {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .task-checkbox:hover { border-color: var(--accent3); }
  .task-checkbox.checked { background: var(--accent3); border-color: var(--accent3); }
  .task-checkbox.checked::after { content: '✓'; color: #0f0f14; font-size: 12px; font-weight: 700; }

  .task-main { flex: 1; min-width: 0; }
  .task-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .task-title { font-weight: 500; font-size: 0.95rem; word-break: break-word; }

  .type-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-assignment { background: rgba(124,110,245,0.18); color: #a98ef8; }
  .badge-quiz       { background: rgba(62,207,172,0.18); color: var(--accent3); }
  .badge-project    { background: rgba(232,168,56,0.18); color: var(--accent2); }
  .badge-other      { background: rgba(136,136,168,0.18); color: var(--text2); }

  .task-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .meta-item { font-size: 0.78rem; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .meta-item svg { opacity: 0.6; }

  .task-status {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600;
  }
  .status-pending    { background: rgba(136,136,168,0.15); color: var(--text2); }
  .status-in-progress { background: rgba(124,110,245,0.18); color: #a98ef8; }
  .status-done       { background: rgba(62,207,172,0.18); color: var(--accent3); }
  .status-overdue    { background: rgba(240,94,106,0.15); color: var(--danger); }

  .task-actions { display: flex; gap: 4px; align-items: center; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px; width: 100%; max-width: 480px;
    animation: scaleIn 0.2s ease both;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast-msg {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 0.85rem; color: var(--text);
    display: flex; align-items: center; gap: 8px;
    animation: slideIn 0.25s ease;
    box-shadow: var(--shadow);
  }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent3); flex-shrink: 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .progress-wrap { margin-top: 8px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text3); margin-bottom: 4px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 99px; transition: width 0.4s ease; }

  .section-count {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 1px 8px; font-size: 0.75rem; color: var(--text2);
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .dashboard { grid-template-columns: 1fr 1fr; }
    header { padding: 18px 0 16px; }
    .filters-bar { gap: 6px; }
    .task-actions { flex-direction: column; }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>Study<span>Flow</span></h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-export btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Task</button>
    </div>
  </header>

  <div class="dashboard" id="dashboard"></div>

  <div class="main-grid">
    <div class="panel" id="quick-panel">
      <div class="panel-header">
        <span class="panel-title">✏️ Quick Add</span>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label>Task Title</label>
          <input class="form-control" id="f-title" placeholder="e.g. Chapter 5 Essay…" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select class="form-control" id="f-type">
              <option value="Assignment">Assignment</option>
              <option value="Quiz">Quiz</option>
              <option value="Project">Project</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-control" id="f-status">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Subject / Course</label>
          <input class="form-control" id="f-subject" placeholder="e.g. Mathematics 101…" />
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input class="form-control" id="f-date" type="date" />
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="addTask()">+ Add Task</button>
        <div class="progress-wrap" id="progress-wrap" style="margin-top:18px"></div>
      </div>
    </div>

    <div>
      <div class="filters-bar">
        <span class="filter-label">View:</span>
        <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-chip today-chip" data-filter="today" onclick="setFilter('today',this)">Today</button>
        <button class="filter-chip overdue-chip" data-filter="overdue" onclick="setFilter('overdue',this)">Overdue</button>
        <button class="filter-chip" data-filter="week" onclick="setFilter('week',this)">This Week</button>
        <div class="filter-sep"></div>
        <span class="filter-label">Type:</span>
        <button class="filter-chip active" data-type="all" onclick="setTypeFilter('all',this)">All</button>
        <button class="filter-chip" data-type="Assignment" onclick="setTypeFilter('Assignment',this)">Assignments</button>
        <button class="filter-chip" data-type="Quiz" onclick="setTypeFilter('Quiz',this)">Quizzes</button>
        <button class="filter-chip" data-type="Project" onclick="setTypeFilter('Project',this)">Projects</button>
        <button class="filter-chip" data-type="Other" onclick="setTypeFilter('Other',this)">Other</button>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px">
        <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem">Tasks <span class="section-count" id="task-count">0</span></span>
        <select class="form-control" style="width:auto;padding:5px 10px;font-size:0.8rem" onchange="setSortOrder(this.value)">
          <option value="due-asc">Due: Soonest first</option>
          <option value="due-desc">Due: Latest first</option>
          <option value="title-asc">Title A→Z</option>
          <option value="status">By Status</option>
        </select>
      </div>

      <div id="task-list"></div>
    </div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">✏️ Add New Task</div>
    <div class="form-group">
      <label>Task Title</label>
      <input class="form-control" id="m-title" placeholder="e.g. Chapter 5 Essay…"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select class="form-control" id="m-type">
          <option>Assignment</option><option>Quiz</option><option>Project</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-control" id="m-status">
          <option>Pending</option><option>In Progress</option><option>Done</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Subject / Course</label>
      <input class="form-control" id="m-subject" placeholder="e.g. Mathematics 101…"/>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input class="form-control" id="m-date" type="date"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addTaskModal()">Add Task</button>
    </div>
  </div>
</div>

<!-- EDIT TASK MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Task</div>
    <input type="hidden" id="e-id"/>
    <div class="form-group">
      <label>Task Title</label>
      <input class="form-control" id="e-title"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select class="form-control" id="e-type">
          <option>Assignment</option><option>Quiz</option><option>Project</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-control" id="e-status">
          <option>Pending</option><option>In Progress</option><option>Done</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Subject / Course</label>
      <input class="form-control" id="e-subject"/>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input class="form-control" id="e-date" type="date"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG — Replace with your Render URL after deploying
═══════════════════════════════════════════ */
const API_BASE = 'https://studyflow-backend-g0cc.onrender.com';

let tasks = [];
let currentFilter = 'all';
let currentTypeFilter = 'all';
let sortOrder = 'due-asc';

async function apiFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadTasks() {
  try {
    tasks = await apiFetch('/api/tasks');
    render();
  } catch(e) {
    toast('⚠️ Could not load tasks: ' + e.message, true);
  }
}

/* ═══════════════════════════════════════════
   ADD TASK
═══════════════════════════════════════════ */
function gatherForm(prefix) {
  const title   = document.getElementById(prefix+'-title').value.trim();
  const type    = document.getElementById(prefix+'-type').value;
  const status  = document.getElementById(prefix+'-status').value;
  const subject = document.getElementById(prefix+'-subject').value.trim();
  const date    = document.getElementById(prefix+'-date').value;
  return { title, type, status, subject, date };
}

function validateTask(t) {
  if (!t.title) return 'Task title is required.';
  if (!t.date)  return 'Due date is required.';
  return null;
}

async function addTask() {
  const t = gatherForm('f');
  const err = validateTask(t);
  if (err) { toast('⚠️ ' + err, true); return; }
  try {
    const newTask = await apiFetch('/api/tasks', { method:'POST', body: JSON.stringify(t) });
    tasks.push(newTask);
    clearForm('f'); render(); toast('✅ Task added!');
  } catch(e) { toast('⚠️ ' + e.message, true); }
}

async function addTaskModal() {
  const t = gatherForm('m');
  const err = validateTask(t);
  if (err) { toast('⚠️ ' + err, true); return; }
  try {
    const newTask = await apiFetch('/api/tasks', { method:'POST', body: JSON.stringify(t) });
    tasks.push(newTask);
    closeModal(); render(); toast('✅ Task added!');
  } catch(e) { toast('⚠️ ' + e.message, true); }
}

function clearForm(p) {
  document.getElementById(p+'-title').value = '';
  document.getElementById(p+'-subject').value = '';
  document.getElementById(p+'-date').value = '';
  document.getElementById(p+'-type').value = 'Assignment';
  document.getElementById(p+'-status').value = 'Pending';
}

/* ═══════════════════════════════════════════
   EDIT / DELETE / TOGGLE
═══════════════════════════════════════════ */
function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('e-id').value = id;
  document.getElementById('e-title').value = t.title;
  document.getElementById('e-type').value = t.type;
  document.getElementById('e-status').value = t.status;
  document.getElementById('e-subject').value = t.subject;
  document.getElementById('e-date').value = t.date;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

async function saveEdit() {
  const id = document.getElementById('e-id').value;
  const data = gatherForm('e');
  try {
    const updated = await apiFetch(`/api/tasks/${id}`, { method:'PUT', body: JSON.stringify(data) });
    const idx = tasks.findIndex(x => x.id === id);
    if (idx !== -1) tasks[idx] = updated;
    closeEditModal(); render(); toast('💾 Task updated!');
  } catch(e) { toast('⚠️ ' + e.message, true); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiFetch(`/api/tasks/${id}`, { method:'DELETE' });
    tasks = tasks.filter(x => x.id !== id);
    render(); toast('🗑 Task deleted.');
  } catch(e) { toast('⚠️ ' + e.message, true); }
}

async function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const newStatus = t.status === 'Done' ? 'Pending' : 'Done';
  try {
    const updated = await apiFetch(`/api/tasks/${id}`, { method:'PUT', body: JSON.stringify({ status: newStatus }) });
    const idx = tasks.findIndex(x => x.id === id);
    if (idx !== -1) tasks[idx] = updated;
    render();
    toast(newStatus === 'Done' ? '✅ Marked complete!' : '↩️ Marked incomplete');
  } catch(e) { toast('⚠️ ' + e.message, true); }
}

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
function today() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}
function dueDate(t) {
  return new Date(t.date + 'T23:59:59');
}
function isOverdue(t) {
  return t.status !== 'Done' && dueDate(t) < new Date();
}
function isToday(t) {
  const d = dueDate(t); const tod = today();
  return d >= tod && d < new Date(tod.getTime() + 86400000);
}
function isThisWeek(t) {
  const d = dueDate(t); const tod = today();
  return d >= tod && d < new Date(tod.getTime() + 7*86400000);
}
function formatDue(t) {
  const d = dueDate(t);
  const now = new Date();
  const diff = d - now;
  if (isOverdue(t)) {
    const days = Math.floor(-diff/86400000);
    return days > 0 ? `${days}d overdue` : 'Overdue';
  }
  if (isToday(t)) return 'Due today';
  const opts = { month:'short', day:'numeric' };
  if (d.getFullYear() !== now.getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString('en-US', opts);
}

/* ═══════════════════════════════════════════
   FILTERS & SORT
   Completed tasks ALWAYS sink to the bottom,
   regardless of the chosen sort order.
═══════════════════════════════════════════ */
function setFilter(v, el) {
  currentFilter = v;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setTypeFilter(v, el) {
  currentTypeFilter = v;
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setSortOrder(v) { sortOrder = v; render(); }

function getFiltered() {
  let list = [...tasks];

  // Apply view filters
  if (currentFilter === 'today')   list = list.filter(isToday);
  if (currentFilter === 'overdue') list = list.filter(isOverdue);
  if (currentFilter === 'week')    list = list.filter(isThisWeek);
  if (currentTypeFilter !== 'all') list = list.filter(t => t.type === currentTypeFilter);

  // Apply chosen sort within non-done and done groups separately
  const sortFn = getSortFn();
  const active = list.filter(t => t.status !== 'Done').sort(sortFn);
  const done   = list.filter(t => t.status === 'Done').sort(sortFn);

  // Done tasks always go to the bottom
  return [...active, ...done];
}

function getSortFn() {
  if (sortOrder === 'due-asc')   return (a, b) => dueDate(a) - dueDate(b);
  if (sortOrder === 'due-desc')  return (a, b) => dueDate(b) - dueDate(a);
  if (sortOrder === 'title-asc') return (a, b) => a.title.localeCompare(b.title);
  if (sortOrder === 'status') {
    const ord = { 'Overdue': -1, 'In Progress': 0, 'Pending': 1 };
    return (a, b) => (ord[isOverdue(a) ? 'Overdue' : a.status] || 0)
                   - (ord[isOverdue(b) ? 'Overdue' : b.status] || 0);
  }
  return () => 0;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function badgeClass(type) {
  return { Assignment:'badge-assignment', Quiz:'badge-quiz', Project:'badge-project', Other:'badge-other' }[type] || 'badge-other';
}
function statusClass(t) {
  if (isOverdue(t)) return 'status-overdue';
  return { Pending:'status-pending', 'In Progress':'status-in-progress', Done:'status-done' }[t.status] || 'status-pending';
}
function statusLabel(t) { return isOverdue(t) ? 'Overdue' : t.status; }

function render() {
  renderDashboard();
  renderList();
  renderProgress();
}

function renderDashboard() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'Done').length;
  const todayCount = tasks.filter(isToday).length;
  const overdueCount = tasks.filter(isOverdue).length;
  const weekCount = tasks.filter(isThisWeek).length;
  document.getElementById('dashboard').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value">${total}</div><div class="stat-sub">all time</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${done}</div><div class="stat-sub">${total?Math.round(done/total*100):0}% done</div></div>
    <div class="stat-card"><div class="stat-label">Due This Week</div><div class="stat-value">${weekCount}</div><div class="stat-sub">${todayCount} due today</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value">${overdueCount}</div><div class="stat-sub">${overdueCount?'needs attention':'all clear ✓'}</div></div>
  `;
}

function renderProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'Done').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const wrap = document.getElementById('progress-wrap');
  if (!wrap) return;
  wrap.innerHTML = total ? `
    <div class="progress-label"><span>Overall Progress</span><span>${done}/${total} done</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  ` : '';
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('task-list');
  document.getElementById('task-count').textContent = list.length;

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="8" width="32" height="32" rx="6" stroke="#8888a8" stroke-width="2"/><path d="M16 20h16M16 26h10" stroke="#8888a8" stroke-width="2" stroke-linecap="round"/></svg>
      <p>No tasks found.<br>Add one above or adjust your filters!</p>
    </div>`;
    return;
  }

  // Find the index where done tasks begin so we can insert the divider
  const firstDoneIdx = list.findIndex(t => t.status === 'Done');
  const doneCount = list.filter(t => t.status === 'Done').length;

  const html = list.map((t, i) => {
    const overdue = isOverdue(t);
    const tod = isToday(t);
    const cardClass = t.status === 'Done' ? 'done' : overdue ? 'overdue' : tod ? 'due-today' : '';
    const checkClass = t.status === 'Done' ? 'checked' : '';

    // Insert divider just before the first Done task
    const divider = (i === firstDoneIdx && doneCount > 0) ? `
      <div class="done-divider">
        <div class="done-divider-line"></div>
        <span class="done-divider-label">✓ Completed (${doneCount})</span>
        <div class="done-divider-line"></div>
      </div>` : '';

    return divider + `
    <div class="task-card ${cardClass}" id="task-${t.id}">
      <div class="task-checkbox ${checkClass}" onclick="toggleDone('${t.id}')" title="Toggle done"></div>
      <div class="task-main">
        <div class="task-top">
          <span class="task-title">${esc(t.title)}</span>
          <span class="type-badge ${badgeClass(t.type)}">${t.type}</span>
          <span class="task-status ${statusClass(t)}">${statusLabel(t)}</span>
        </div>
        <div class="task-meta">
          ${t.subject ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H2zM2 7h12v2H2zM2 11h8v2H2z"/></svg>${esc(t.subject)}</span>` : ''}
          <span class="meta-item" style="color:${overdue?'var(--danger)':tod?'var(--accent2)':'var(--text2)'}">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 14A6 6 0 118 2a6 6 0 010 12zm.5-10h-1v5l4 2.4.5-.85-3.5-2.1z"/></svg>
            ${formatDue(t)}
          </span>
        </div>
      </div>
      <div class="task-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${t.id}')" title="Edit">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   EXPORT CSV
═══════════════════════════════════════════ */
function exportCSV() {
  if (!tasks.length) { toast('No tasks to export.'); return; }
  const header = 'Title,Type,Subject,Due Date,Status\n';
  const rows = tasks.map(t =>
    [t.title, t.type, t.subject, t.date, t.status]
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const blob = new Blob([header+rows], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'studyflow_tasks.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSV exported!');
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); clearForm('m'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });
document.getElementById('edit-modal').addEventListener('click', e => { if (e.target.id==='edit-modal') closeEditModal(); });

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function toast(msg, warn=false) {
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.innerHTML = `<div class="toast-dot" style="${warn?'background:var(--accent2)':''}"></div>${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeEditModal(); }
});

loadTasks();
</script>
